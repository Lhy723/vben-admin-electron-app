<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Vben Admin Electron Test</title>
    <style>
      body {
        margin: 40px;
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
      }

      .container {
        max-width: 800px;
        padding: 20px;
        margin: 0 auto;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 2px 10px rgb(0 0 0 / 10%);
      }

      h1 {
        color: #333;
        text-align: center;
      }

      .info-box {
        padding: 15px;
        margin: 20px 0;
        background-color: #e8f4fd;
        border-left: 4px solid #2196f3;
        border-radius: 4px;
      }

      .button-group {
        margin: 30px 0;
        text-align: center;
      }

      button {
        padding: 10px 20px;
        margin: 0 10px;
        font-size: 16px;
        color: white;
        cursor: pointer;
        background-color: #2196f3;
        border: none;
        border-radius: 4px;
      }

      button:hover {
        background-color: #0b7dda;
      }

      .result {
        padding: 15px;
        margin: 20px 0;
        background-color: #f9f9f9;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Vben Admin Electron 应用测试</h1>

      <div class="info-box">
        <p>
          这是一个简单的测试页面，用于验证 Electron 应用的基本功能是否正常工作。
        </p>
      </div>

      <div class="button-group">
        <button id="getAppInfo">获取应用信息</button>
        <button id="showNotification">显示通知</button>
        <button id="windowControl">窗口控制</button>
      </div>

      <div class="result" id="result">
        <p>测试结果将显示在这里...</p>
      </div>
    </div>

    <script>
      // 等待 DOM 加载完成
      document.addEventListener('DOMContentLoaded', function () {
        const resultDiv = document.getElementById('result');

        // 获取应用信息按钮
        document
          .getElementById('getAppInfo')
          .addEventListener('click', async function () {
            try {
              if (window.electronAPI) {
                const version = await window.electronAPI.getAppVersion();
                const name = await window.electronAPI.getAppName();
                resultDiv.innerHTML = `<p><strong>应用名称:</strong> ${name}</p>
                                              <p><strong>应用版本:</strong> ${version}</p>`;
              } else {
                resultDiv.innerHTML = '<p>Electron API 未加载</p>';
              }
            } catch (error) {
              resultDiv.innerHTML = `<p><strong>错误:</strong> ${error.message}</p>`;
            }
          });

        // 显示通知按钮
        document
          .getElementById('showNotification')
          .addEventListener('click', function () {
            if (window.electronAPI) {
              window.electronAPI.showNotification(
                'Vben Admin',
                '这是一条测试通知',
              );
              resultDiv.innerHTML = '<p>通知已发送</p>';
            } else {
              resultDiv.innerHTML = '<p>Electron API 未加载</p>';
            }
          });

        // 窗口控制按钮
        document
          .getElementById('windowControl')
          .addEventListener('click', function () {
            if (window.electronAPI) {
              window.electronAPI.minimizeWindow();
              resultDiv.innerHTML = '<p>窗口已最小化</p>';
            } else {
              resultDiv.innerHTML = '<p>Electron API 未加载</p>';
            }
          });
      });
    </script>
  </body>
</html>
